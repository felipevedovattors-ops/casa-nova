<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Casa Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos das Urgências e Estados */
        .feito { opacity: 0.5; text-decoration: line-through; border-left: 6px solid #10b981 !important; background-color: #f8fafc; }
        .urgencia-alta { border-left: 6px solid #ef4444; }
        .urgencia-media { border-left: 6px solid #f59e0b; }
        .urgencia-baixa { border-left: 6px solid #3b82f6; }
        .tab-ativa { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans pb-20">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white text-2xl shadow-lg"><i class="fas fa-home"></i></div>
                <h1 class="text-xl font-black text-indigo-900 tracking-tight uppercase">Minha Casa Online</h1>
            </div>
            <div id="status" class="text-[10px] font-bold text-emerald-500 uppercase">● Sincronizado</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Concluído</p>
                <h3 id="progresso-texto" class="text-3xl font-black text-indigo-600">0%</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Comprados</p>
                <h3 id="count-temos" class="text-3xl font-black text-emerald-500">0</h3>
            </div>
            <div class="bg-indigo-600 p-5 rounded-2xl shadow-xl text-white text-center">
                <p class="text-[10px] text-indigo-200 font-bold uppercase mb-1">Falta Investir</p>
                <h3 id="total-preco" class="text-3xl font-black">R$ 0,00</h3>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-md border p-6 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Nome do Item</label>
                    <input type="text" id="itemInput" placeholder="Ex: Geladeira..." class="w-full border-2 border-slate-100 rounded-xl px-4 py-2 outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Preço (R$)</label>
                    <input type="number" id="precoInput" placeholder="0.00" class="w-full border-2 border-slate-100 rounded-xl px-4 py-2 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Urgência</label>
                    <select id="urgenciaInput" class="w-full border-2 border-slate-100 rounded-xl px-4 py-2 bg-white font-bold">
                        <option value="urgencia-alta">ALTA</option>
                        <option value="urgencia-media" selected>MÉDIA</option>
                        <option value="urgencia-baixa">BAIXA</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Área</label>
                    <select id="areaInput" class="w-full border-2 border-slate-100 rounded-xl px-4 py-2 bg-white font-bold">
                        <option value="Reforma">REFORMA</option>
                        <option value="Cozinha">COZINHA</option>
                        <option value="Quarto">QUARTO</option>
                        <option value="Sala">SALA</option>
                        <option value="Banheiro">BANHEIRO</option>
                        <option value="Lavanderia">LAVANDERIA</option>
                    </select>
                </div>
                <button onclick="addItem()" class="md:col-span-5 bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg uppercase active:scale-95 transition-all">Adicionar à Nuvem</button>
            </div>
        </div>
