<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Casa Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .feito { opacity: 0.5; text-decoration: line-through; border-left: 6px solid #10b981 !important; }
        .urgencia-alta { border-left: 6px solid #ef4444; }
    </style>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Minha Casa Online</h1>
        <div id="status" class="text-xs text-emerald-500 mb-4">Conectando...</div>

        <div class="space-y-4">
            <input type="text" id="nomeItem" placeholder="O que você quer comprar?" class="w-full border p-3 rounded-xl outline-none focus:border-indigo-500">
            <input type="number" id="precoItem" placeholder="Preço aproximado (R$)" class="w-full border p-3 rounded-xl outline-none">
            <button onclick="salvarNovoItem()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all">ADICIONAR À NUVEM</button>
        </div>

        <div id="minhaLista" class="mt-8 space-y-3"></div>
    </div>

    <script>
        const _URL = 'https://sqzdplfetyykxgwcyxnv.supabase.co';
        const _KEY = 'sb_publishable_KO1IAk-uOaxmBNar2sHsQw_XI_XjItw';
        const supabase = supabase.createClient(_URL, _KEY);

        async function carregarLista() {
            document.getElementById('status').innerText = '⏳ Carregando...';
            const { data, error } = await supabase.from('lista_casa').select('*').order('id', { ascending: false });
            
            const listaElemento = document.getElementById('minhaLista');
            listaElemento.innerHTML = '';
            
            if (data) {
                data.forEach(item => {
                    listaElemento.innerHTML += `
                        <div class="p-4 bg-slate-50 rounded-xl border flex justify-between items-center ${item.feito ? 'feito' : ''}">
                            <div>
                                <p class="font-bold text-slate-800">${item.nome}</p>
                                <p class="text-sm text-indigo-600">R$ ${item.preco.toLocaleString('pt-BR')}</p>
                            </div>
                            <button onclick="apagarItem(${item.id})" class="text-red-400 p-2">Apagar</button>
                        </div>
                    `;
                });
                document.getElementById('status').innerText = '● Sincronizado';
            }
        }

        async function salvarNovoItem() {
            const n = document.getElementById('nomeItem').value;
            const p = document.getElementById('precoItem').value;
            
            if(n.trim() !== "") {
                const { error } = await supabase.from('lista_casa').insert([{ 
                    nome: n, 
                    preco: parseFloat(p) || 0 
                }]);
                
                if(!error) {
                    document.getElementById('nomeItem').value = '';
                    document.getElementById('precoItem').value = '';
                    carregarLista();
                } else {
                    alert("Erro ao salvar! Verifique o Supabase.");
                }
            }
        }

        async function apagarItem(id) {
            if(confirm('Deseja excluir?')) {
                await supabase.from('lista_casa').delete().eq('id', id);
                carregarLista();
            }
        }

        carregarLista();
    </script>
</body>
</html>
