<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Nossa Casa Nova - Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .feito { opacity: 0.5; text-decoration: line-through; border-left: 4px solid #10b981 !important; background-color: #f8fafc; }
        .urgencia-alta { border-left: 4px solid #ef4444; }
        .urgencia-media { border-left: 4px solid #f59e0b; }
        .urgencia-baixa { border-left: 4px solid #3b82f6; }
        .tab-ativa { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        <header class="flex items-center gap-3 mb-8">
            <div class="bg-indigo-600 p-2 rounded-lg text-white text-2xl"><i class="fas fa-home"></i></div>
            <h1 class="text-2xl font-bold text-indigo-900">A Nossa Casa Nova</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Progresso</p>
                <h3 id="progresso-texto" class="text-2xl font-bold text-indigo-600">0%</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Já Temos</p>
                <h3 id="count-temos" class="text-2xl font-bold text-green-600">0</h3>
            </div>
            <div class="bg-indigo-900 p-4 rounded-xl shadow-lg text-white">
                <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-wider">Falta Investir</p>
                <h3 id="total-preco" class="text-2xl font-bold">R$ 0,00</h3>
            </div>
        </div>

        <nav class="flex gap-6 border-b mb-8 overflow-x-auto pb-1 no-scrollbar">
            <button onclick="changeTab('Todos')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Todos</button>
            <button onclick="changeTab('Reforma')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap"><i class="fas fa-tools mr-1"></i> Reforma</button>
            <button onclick="changeTab('Cozinha')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Cozinha</button>
            <button onclick="changeTab('Quarto')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Quarto</button>
            <button onclick="changeTab('Sala')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Sala</button>
            <button onclick="changeTab('Banheiro')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Banheiro</button>
            <button onclick="changeTab('Lavanderia')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Lavanderia</button>
        </nav>

        <div class="bg-white rounded-2xl shadow-sm border p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <input type="text" id="itemInput" placeholder="Ex: Piso, Geladeira..." class="border rounded-lg px-4 py-2 col-span-1 md:col-span-2">
                <input type="number" id="precoInput" placeholder="Preço (R$)" class="border rounded-lg px-4 py-2">
                <select id="urgenciaInput" class="border rounded-lg px-4 py-2 bg-white">
                    <option value="urgencia-alta">Urgência: Alta</option>
                    <option value="urgencia-media" selected>Urgência: Média</option>
                    <option value="urgencia-baixa">Urgência: Baixa</option>
                </select>
                <select id="areaInput" class="border rounded-lg px-4 py-2 bg-white">
                    <option value="Reforma">Reforma</option>
                    <option value="Cozinha">Cozinha</option>
                    <option value="Quarto">Quarto</option>
                    <option value="Sala">Sala</option>
                    <option value="Banheiro">Banheiro</option>
                    <option value="Lavanderia">Lavanderia</option>
                </select>
                <button onclick="addItem()" class="bg-indigo-600 text-white font-bold py-3 rounded-lg md:col-span-5 hover:bg-indigo-700 shadow-md">Adicionar à Lista</button>
            </div>
        </div>

        <div id="listaContainer" class="space-y-3 pb-20"></div>
    </div>

    <script>
        // LISTA BÁSICA INICIAL
        const itensIniciais = [
            { nome: "Pintura Geral", preco: 0, urgencia: "urgencia-alta", area: "Reforma", feito: false },
            { nome: "Piso/Revestimento", preco: 0, urgencia: "urgencia-media", area: "Reforma", feito: false },
            { nome: "Geladeira", preco: 0, urgencia: "urgencia-alta", area: "Cozinha", feito: false },
            { nome: "Fogão", preco: 0, urgencia: "urgencia-alta", area: "Cozinha", feito: false },
            { nome: "Armários de Cozinha", preco: 0, urgencia: "urgencia-media", area: "Cozinha", feito: false },
            { nome: "Cama Box", preco: 0, urgencia: "urgencia-alta", area: "Quarto", feito: false },
            { nome: "Guarda-Roupa", preco: 0, urgencia: "urgencia-media", area: "Quarto", feito: false },
            { nome: "Sofá", preco: 0, urgencia: "urgencia-alta", area: "Sala", feito: false },
            { nome: "Painel de TV", preco: 0, urgencia: "urgencia-baixa", area: "Sala", feito: false },
            { nome: "Máquina de Lavar", preco: 0, urgencia: "urgencia-alta", area: "Lavanderia", feito: false },
            { nome: "Chuveiro", preco: 0, urgencia: "urgencia-alta", area: "Banheiro", feito: false }
        ];

        let itens = JSON.parse(localStorage.getItem('listaCasaNova_v2'));
        
        // Se a lista estiver vazia, carrega a básica
        if (!itens || itens.length === 0) {
            itens = itensIniciais;
        }

        let currentTab = 'Todos';

        function salvar() {
            localStorage.setItem('listaCasaNova_v2', JSON.stringify(itens));
            render();
        }

        function render() {
            const container = document.getElementById('listaContainer');
            const tabs = document.querySelectorAll('.tab-btn');
            container.innerHTML = '';
            let totalPendente = 0;
            let totalTemos = 0;

            tabs.forEach(tab => {
                if(tab.innerText.includes(currentTab)) tab.classList.add('tab-ativa');
                else tab.classList.remove('tab-ativa');
            });

            const filtrados = currentTab === 'Todos' ? itens : itens.filter(i => i.area === currentTab);

            filtrados.forEach((item) => {
                const originalIndex = itens.indexOf(item);
                if(!item.feito) totalPendente += item.preco;
                else totalTemos++;

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border flex justify-between items-center ${item.feito ? 'feito' : item.urgencia}">
                        <div class="flex items-center gap-4">
                            <input type="checkbox" ${item.feito ? 'checked' : ''} onchange="toggle(${originalIndex})" class="w-6 h-6 rounded text-indigo-600">
                            <div>
                                <p class="font-bold text-slate-800 text-lg">${item.nome}</p>
                                <div class="flex gap-2 items-center">
                                    <span class="text-xs font-bold bg-slate-100 px-2 py-0.5 rounded text-slate-500">${item.area}</span>
                                    <input type="number" value="${item.preco}" onchange="updatePreco(${originalIndex}, this.value)" class="w-24 border rounded px-1 text-sm" placeholder="R$">
                                </div>
                            </div>
                        </div>
                        <button onclick="remove(${originalIndex})" class="text-slate-300 hover:text-rose-500 p-2"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
            });

            document.getElementById('total-preco').innerText = "R$ " + totalPendente.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('count-temos').innerText = totalTemos;
            const progresso = itens.length > 0 ? Math.round((totalTemos / itens.length) * 100) : 0;
            document.getElementById('progresso-texto').innerText = progresso + "%";
        }

        function updatePreco(index, valor) {
            itens[index].preco = parseFloat(valor) || 0;
            salvar();
        }

        function addItem() {
            const nome = document.getElementById('itemInput');
            const preco = document.getElementById('precoInput');
            const urgencia = document.getElementById('urgenciaInput');
            const area = document.getElementById('areaInput');

            if(nome.value.trim()) {
                itens.push({
                    nome: nome.value,
                    preco: parseFloat(preco.value) || 0,
                    urgencia: urgencia.value,
                    area: area.value,
                    feito: false
                });
                nome.value = ''; preco.value = '';
                salvar();
            }
        }

        function toggle(i) { itens[i].feito = !itens[i].feito; salvar(); }
        function remove(i) { if(confirm('Remover item?')) { itens.splice(i, 1); salvar(); } }
        function changeTab(t) { currentTab = t; render(); }

        render();
    </script>
</body>
</html>
