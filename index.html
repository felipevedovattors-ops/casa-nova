<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Nossa Casa Nova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .feito { opacity: 0.5; text-decoration: line-through; border-left: 4px solid #10b981 !important; background-color: #f8fafc; }
        .urgencia-alta { border-left: 4px solid #ef4444; }
        .urgencia-media { border-left: 4px solid #f59e0b; }
        .urgencia-baixa { border-left: 4px solid #3b82f6; }
        .tab-ativa { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans pb-20">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white text-2xl"><i class="fas fa-home"></i></div>
                <h1 class="text-2xl font-bold text-indigo-900 text-lg md:text-2xl">A Nossa Casa Nova</h1>
            </div>
            <button onclick="resetarLista()" class="text-[9px] md:text-[10px] bg-amber-100 hover:bg-amber-200 px-3 py-2 rounded shadow-sm text-amber-700 font-bold uppercase transition-all">Zerar e Sugerir Preços</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-[10px] text-slate-500 font-bold uppercase">Progresso</p>
                <h3 id="progresso-texto" class="text-2xl font-bold text-indigo-600">0%</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-[10px] text-slate-500 font-bold uppercase">Já Temos</p>
                <h3 id="count-temos" class="text-2xl font-bold text-green-600">0</h3>
            </div>
            <div class="bg-indigo-900 p-4 rounded-xl shadow-lg text-white">
                <p class="text-[10px] text-indigo-300 font-bold uppercase">Falta Investir</p>
                <h3 id="total-preco" class="text-2xl font-bold">R$ 0,00</h3>
            </div>
        </div>

        <nav class="flex gap-4 md:gap-6 border-b mb-8 overflow-x-auto pb-1 no-scrollbar text-sm md:text-base">
            <button onclick="changeTab('Todos')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Todos</button>
            <button onclick="changeTab('Reforma')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Reforma</button>
            <button onclick="changeTab('Cozinha')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Cozinha</button>
            <button onclick="changeTab('Quarto')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Quarto</button>
            <button onclick="changeTab('Sala')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Sala</button>
            <button onclick="changeTab('Banheiro')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Banheiro</button>
            <button onclick="changeTab('Lavanderia')" class="tab-btn pb-4 px-2 text-slate-400 whitespace-nowrap">Lavanderia</button>
        </nav>

        <div id="listaContainer" class="space-y-3"></div>
    </div>

    <script>
        const iniciais = [
            { nome: "Piso e Azulejo", preco: 2500, urgencia: "urgencia-media", area: "Reforma", feito: false },
            { nome: "Geladeira Duplex", preco: 3200, urgencia: "urgencia-alta", area: "Cozinha", feito: false },
            { nome: "Fogão 4 Bocas", preco: 900, urgencia: "urgencia-alta", area: "Cozinha", feito: false },
            { nome: "Cama Box Casal", preco: 1800, urgencia: "urgencia-alta", area: "Quarto", feito: false },
            { nome: "Sofá 3 Lugares", preco: 2200, urgencia: "urgencia-alta", area: "Sala", feito: false },
            { nome: "Chuveiro Eletrônico", preco: 150, urgencia: "urgencia-alta", area: "Banheiro", feito: false },
            { nome: "Máquina de Lavar", preco: 1900, urgencia: "urgencia-alta", area: "Lavanderia", feito: false }
        ];

        let itens = JSON.parse(localStorage.getItem('casa_nova_v_final')) || iniciais;
        let currentTab = 'Todos';

        function salvar() {
            localStorage.setItem('casa_nova_v_final', JSON.stringify(itens));
            render();
        }

        function render() {
            const container = document.getElementById('listaContainer');
            const tabs = document.querySelectorAll('.tab-btn');
            container.innerHTML = '';
            let total = 0, temos = 0;

            tabs.forEach(tab => tab.classList.toggle('tab-ativa', tab.innerText.includes(currentTab)));
            const filtrados = currentTab === 'Todos' ? itens : itens.filter(i => i.area === currentTab);

            filtrados.forEach((item) => {
                const idx = itens.indexOf(item);
                if(!item.feito) total += item.preco; else temos++;

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border flex justify-between items-center ${item.feito ? 'feito' : item.urgencia}">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${item.feito ? 'checked' : ''} onchange="toggle(${idx})" class="w-6 h-6 rounded text-indigo-600">
                            <div>
                                <p class="font-bold text-slate-800">${item.nome}</p>
                                <div class="flex gap-2 items-center">
                                    <span class="text-[10px] bg-slate-100 px-1 rounded text-slate-400 font-bold uppercase">${item.area}</span>
                                    <span class="text-xs text-slate-400">R$</span>
                                    <input type="number" value="${item.preco}" onchange="updatePreco(${idx}, this.value)" class="w-20 border-b text-xs outline-none" placeholder="0">
                                </div>
                            </div>
                        </div>
                        <button onclick="remove(${idx})" class="text-slate-200 hover:text-rose-500"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });

            document.getElementById('total-preco').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('count-temos').innerText = temos;
            document.getElementById('progresso-texto').innerText = itens.length ? Math.round((temos/itens.length)*100) + "%" : "0%";
        }

        function updatePreco(i, v) { itens[i].preco = parseFloat(v) || 0; salvar(); }
        function toggle(i) { itens[i].feito = !itens[i].feito; salvar(); }
        function remove(i) { if(confirm('Remover?')) { itens.splice(i, 1); salvar(); } }
        function changeTab(t) { currentTab = t; render(); }
        function resetarLista() { if(confirm('Zerar e carregar sugestões?')) { itens = JSON.parse(JSON.stringify(iniciais)); salvar(); } }

        render();
    </script>
</body>
</html>
