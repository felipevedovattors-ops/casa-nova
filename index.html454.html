<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Nossa Casa Nova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .done { opacity: 0.5; text-decoration: line-through; border-left: 4px solid #10b981 !important; background-color: #f8fafc; }
        .urgencia-alta { border-left: 4px solid #ef4444; }
        .urgencia-media { border-left: 4px solid #f59e0b; }
        .urgencia-baixa { border-left: 4px solid #3b82f6; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        <header class="flex items-center gap-3 mb-8">
            <div class="bg-indigo-600 p-2 rounded-lg text-white text-2xl"><i class="fas fa-home"></i></div>
            <h1 class="text-2xl font-bold text-indigo-900">A Nossa Casa Nova</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <p class="text-[10px] text-slate-500 font-bold uppercase">Progresso</p>
                <h3 id="progresso-texto" class="text-2xl font-bold text-indigo-600">0%</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <p class="text-[10px] text-slate-500 font-bold uppercase">Já Temos</p>
                <h3 id="count-temos" class="text-2xl font-bold text-green-600">0</h3>
            </div>
            <div class="bg-indigo-900 p-4 rounded-xl shadow-lg col-span-2 text-white">
                <p class="text-[10px] text-indigo-300 font-bold uppercase">Falta Investir</p>
                <h3 id="total-preco" class="text-2xl font-bold">R$ 0,00</h3>
            </div>
        </div>

        <nav class="flex gap-6 border-b mb-8 overflow-x-auto pb-1">
            <button onclick="changeTab('Todos')" class="tab-btn pb-4 px-2 text-slate-400">Todos</button>
            <button onclick="changeTab('Cozinha')" class="tab-btn pb-4 px-2 text-slate-400">Cozinha</button>
            <button onclick="changeTab('Quarto')" class="tab-btn pb-4 px-2 text-slate-400">Quarto</button>
            </nav>

        <div class="bg-white rounded-2xl shadow-sm border p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <input type="text" id="itemInput" placeholder="Item..." class="border rounded-lg px-4 py-2">
                <input type="number" id="precoInput" placeholder="Preço" class="border rounded-lg px-4 py-2">
                <select id="areaInput" class="border rounded-lg px-4 py-2">
                    <option value="Cozinha">Cozinha</option>
                    <option value="Quarto">Quarto</option>
                </select>
                <button onclick="addItem()" class="bg-indigo-600 text-white font-bold py-2 rounded-lg">Adicionar</button>
            </div>
        </div>

        <div id="listaContainer" class="space-y-3 pb-20"></div>
    </div>

    <script>
        let itens = JSON.parse(localStorage.getItem('listaCasa')) || [];
        let currentTab = 'Todos';

        function salvar() {
            localStorage.setItem('listaCasa', JSON.stringify(itens));
            render();
        }

        function render() {
            const container = document.getElementById('listaContainer');
            container.innerHTML = '';
            let total = 0;
            let temos = 0;

            const filtrados = currentTab === 'Todos' ? itens : itens.filter(i => i.area === currentTab);

            filtrados.forEach((item, index) => {
                if(!item.feito) total += (item.preco * item.qtd);
                else temos++;

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border flex justify-between items-center ${item.feito ? 'done' : ''}">
                        <div>
                            <button onclick="toggle(${itens.indexOf(item)})" class="font-bold">${item.nome}</button>
                            <p class="text-xs text-slate-400">R$ ${item.preco} - ${item.area}</p>
                        </div>
                        <button onclick="remove(${itens.indexOf(item)})" class="text-rose-500"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });

            document.getElementById('total-preco').innerText = "R$ " + total.toLocaleString('pt-BR');
            document.getElementById('count-temos').innerText = temos;
            document.getElementById('progresso-texto').innerText = itens.length > 0 ? Math.round((temos/itens.length)*100) + "%" : "0%";
        }

        function addItem() {
            const n = document.getElementById('itemInput'), p = document.getElementById('precoInput'), a = document.getElementById('areaInput');
            if(n.value) {
                itens.push({ nome: n.value, preco: parseFloat(p.value) || 0, area: a.value, feito: false, qtd: 1 });
                n.value = ''; p.value = ''; salvar();
            }
        }

        function toggle(i) { itens[i].feito = !itens[i].feito; salvar(); }
        function remove(i) { itens.splice(i, 1); salvar(); }
        function changeTab(t) { currentTab = t; render(); }

        render();
    </script>
</body>
</html>
